matrix:
  - name: README
    aspell:
      lang: en
    dictionary:
      encoding: utf-8
      word_lists:
        - .github/actions/spellcheck/wordlist.txt
      output: docs/dict.dic
    pipeline:
      - pyspelling.filters.html:
          comments: false
          ignores:
            - code
            - pre
    sources:
      - "docs/**.md"
    default_encoding: utf-8
