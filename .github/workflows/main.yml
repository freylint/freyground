name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: rojopolis/spellcheck-github-actions@0.28.0
        name: Spellcheck
        with:
          config_path: config/spellcheck.yml
          source_files: docs/**.md
          task_name: README
