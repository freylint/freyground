name: Spellchecker

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: rojopolis/spellcheck-github-actions@0.28.0
        name: Spellcheck
        with:
          config_path: .github/workflows/spellcheck/spellcheck.yml
          source_files: README.md
          task_name: README
